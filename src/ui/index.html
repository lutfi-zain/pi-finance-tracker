<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Finance Tracker</title>
<style>
  /* ── reset & tokens ────────────────────────────────────────────────── */
  *,*::before,*::after { box-sizing: border-box; }
  :root {
    --bg: #0b0e14;
    --bg-elev: #131722;
    --bg-elev-2: #1a2030;
    --border: #232a3d;
    --border-strong: #2f3850;
    --text: #e6e9f2;
    --text-dim: #9aa3b8;
    --text-faint: #5d6679;
    --accent: #7c5cff;
    --accent-2: #5b8def;
    --income: #22c55e;
    --expense: #ef4444;
    --transfer: #f59e0b;
    --danger: #f43f5e;
    --shadow: 0 10px 40px rgba(0,0,0,.45);
    --radius: 12px;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    background-image:
      radial-gradient(800px 500px at 90% -10%, rgba(124,92,255,.12), transparent 60%),
      radial-gradient(700px 400px at -10% 110%, rgba(91,141,239,.10), transparent 60%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  a { color: var(--accent-2); text-decoration: none; }
  button { font: inherit; cursor: pointer; }

  /* ── layout ───────────────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  aside {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px;
    padding: 0 8px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .brand-dot {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    color: white; font-size: 14px; font-weight: 800;
  }
  nav button {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px; margin-bottom: 2px;
    background: transparent; color: var(--text-dim);
    border: 0; border-radius: 8px; text-align: left;
    font-weight: 500;
    transition: background .15s, color .15s;
  }
  nav button:hover { background: var(--bg-elev-2); color: var(--text); }
  nav button.active {
    background: linear-gradient(90deg, rgba(124,92,255,.18), rgba(124,92,255,.04));
    color: var(--text);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  nav .icon { width: 18px; text-align: center; opacity: .9; }
  .footer-link {
    position: absolute; bottom: 16px; left: 16px; right: 16px;
    font-size: 12px; color: var(--text-faint); padding: 0 8px;
  }
  main { padding: 32px 40px; max-width: 1200px; }

  /* ── typography ───────────────────────────────────────────────────── */
  h1 { font-size: 24px; margin: 0 0 6px; font-weight: 700; letter-spacing: -.02em; }
  h2 { font-size: 18px; margin: 0 0 12px; font-weight: 600; }
  .subtitle { color: var(--text-dim); margin: 0 0 28px; }

  /* ── cards & grid ─────────────────────────────────────────────────── */
  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 900px) { .grid-4, .grid-3 { grid-template-columns: repeat(2,1fr); } .app { grid-template-columns: 1fr; } aside { position: relative; height: auto; } }
  @media (max-width: 600px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } main { padding: 20px; } }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .stat .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 6px; letter-spacing: -.02em; }
  .stat .value.income { color: var(--income); }
  .stat .value.expense { color: var(--expense); }
  .stat .value.net { color: var(--accent-2); }
  .stat .sub { font-size: 12px; color: var(--text-faint); margin-top: 4px; }

  /* ── toolbar ──────────────────────────────────────────────────────── */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar .spacer { flex: 1; }
  .btn {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    transition: all .15s;
  }
  .btn:hover { background: var(--bg-elev-2); border-color: var(--accent); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: white;
  }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: rgba(244,63,94,.1); border-color: var(--danger); }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.small { padding: 4px 10px; font-size: 12px; }
  .icon-btn {
    background: transparent; border: 0;
    color: var(--text-dim); padding: 4px 8px; border-radius: 6px;
    font-size: 13px;
  }
  .icon-btn:hover { background: var(--bg-elev-2); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger); background: rgba(244,63,94,.1); }

  .input, .select, textarea.input {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 9px 12px;
    font: inherit;
    width: 100%;
    transition: border-color .15s;
  }
  .input:focus, .select:focus, textarea.input:focus {
    outline: 0;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,.18);
  }
  .input::placeholder { color: var(--text-faint); }
  .search { width: 280px; }

  /* ── table ────────────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data th, table.data td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  table.data th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); font-weight: 600; }
  table.data tr:hover td { background: rgba(255,255,255,.02); }
  table.data td.actions { text-align: right; white-space: nowrap; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge.income { background: rgba(34,197,94,.15); color: var(--income); }
  .badge.expense { background: rgba(239,68,68,.15); color: var(--expense); }
  .badge.transfer { background: rgba(245,158,11,.15); color: var(--transfer); }
  .tag-chip {
    display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
    background: var(--bg-elev-2); color: var(--text-dim); margin-right: 4px;
    border: 1px solid var(--border);
  }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }

  /* ── modal ────────────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: grid; place-items: center; z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    width: min(560px, calc(100vw - 32px));
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 22px; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .form-row .help { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row.row-2 .form-row { margin-bottom: 0; }
  .err { color: var(--danger); font-size: 12px; margin-top: 6px; }

  /* ── segmented control ────────────────────────────────────────────── */
  .segmented {
    display: inline-flex; background: var(--bg-elev-2);
    border-radius: 8px; padding: 3px; gap: 2px;
  }
  .segmented button {
    background: transparent; border: 0; color: var(--text-dim);
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  }
  .segmented button.active { background: var(--bg-elev); color: var(--text); }

  /* ── empty state ──────────────────────────────────────────────────── */
  .empty {
    padding: 48px 20px; text-align: center; color: var(--text-faint);
  }
  .empty .emoji { font-size: 36px; margin-bottom: 8px; }

  /* ── toast ────────────────────────────────────────────────────────── */
  .toast-stack { position: fixed; bottom: 20px; right: 20px; display: grid; gap: 8px; z-index: 200; }
  .toast {
    background: var(--bg-elev-2);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--accent);
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    min-width: 220px;
    animation: slideIn .2s ease;
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.success { border-left-color: var(--income); }
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* hide scrollbars in cards */
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* ── capture view ─────────────────────────────────────────────────── */
  .dropzone {
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover,
  .dropzone.drag-over { border-color: var(--accent); background: rgba(124,92,255,.05); }
  .dropzone-icon { font-size: 36px; margin-bottom: 8px; }
  .dropzone-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .dropzone-hint { font-size: 13px; color: var(--text-dim); }
  .dropzone-formats { font-size: 12px; color: var(--text-faint); margin-top: 8px; }
  .capture-preview { margin-top: 16px; }
  .capture-preview .preview-text {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 13px; line-height: 1.6;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap;
  }
  .capture-preview .preview-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .capture-preview .preview-actions { display: flex; gap: 8px; margin-top: 12px; }
  .capture-checklist { margin-top: 12px; }
  .capture-checklist .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .capture-checklist .check-row:hover { background: rgba(255,255,255,.02); }
  .capture-checklist .check-row input[type="checkbox"] { accent-color: var(--accent); }
  .capture-privacy { margin-top: 16px; font-size: 12px; color: #f59e0b; }
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="brand-dot">$</div>
      <span>Finance</span>
    </div>
    <nav id="nav">
      <button data-view="dashboard" class="active"><span class="icon">◐</span> Dashboard</button>
      <button data-view="wallets"><span class="icon">▣</span> Wallets</button>
      <button data-view="categories"><span class="icon">⌘</span> Categories</button>
      <button data-view="tags"><span class="icon">#</span> Tags</button>
      <button data-view="transactions"><span class="icon">⇄</span> Transactions</button>
      <button data-view="capture"><span class="icon">⤴</span> Capture</button>
    </nav>
    <div class="footer-link">
      <span id="status-line">Loading…</span>
    </div>
  </aside>
  <main id="view"></main>
</div>
<div id="modal-root"></div>
<div class="toast-stack" id="toast-stack"></div>

<script>
/* ───────────────────────────────────────────────────────────────────
   Finance Tracker — single-page app
   ─────────────────────────────────────────────────────────────────── */

const NO_DECIMAL_CCY = new Set(["JPY","KRW","IDR","VND","CLP","PYG","UGX","XAF","XOF","BIF","DJF","GNF","KMF","RWF","XPF"]);

const state = {
  view: "dashboard",
  wallets: [], categories: [], tags: [], transactions: [],
  txFilter: { wallet_id: "", category_id: "", tag_id: "", type: "", from: "", to: "", q: "" },
  categoryKind: "expense",
  loading: false,
  captureTab: "audio",
  captureData: null, // { mediaId, kind, result, candidates, sourceName } after upload
};

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function fmt(amount_minor, currency) {
  if (amount_minor == null) return "—";
  const noDec = NO_DECIMAL_CCY.has((currency || "USD").toUpperCase());
  const divisor = noDec ? 1 : 100;
  const major = amount_minor / divisor;
  // Use locale-aware formatting but keep it deterministic
  const opts = { minimumFractionDigits: noDec ? 0 : 2, maximumFractionDigits: noDec ? 0 : 2 };
  return new Intl.NumberFormat("en-US", opts).format(major) + " " + currency;
}

function signFmt(amount_minor, currency, type) {
  const str = fmt(Math.abs(amount_minor), currency);
  if (type === "expense") return "−" + str;
  if (type === "income") return "+" + str;
  return str;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function toast(message, kind = "info") {
  const el = document.createElement("div");
  el.className = "toast " + (kind === "error" ? "error" : kind === "success" ? "success" : "");
  el.textContent = message;
  $("#toast-stack").appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateY(8px)"; }, 2400);
  setTimeout(() => el.remove(), 2800);
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["content-type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const text = await r.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = { error: text }; }
  if (!r.ok) {
    const msg = (data && data.error) || `${r.status} ${r.statusText}`;
    throw new Error(msg);
  }
  return data;
}

async function loadAll() {
  state.loading = true;
  try {
    const [wallets, categories, tags, transactions, summary] = await Promise.all([
      api("GET", "/api/wallets?include_archived=true"),
      api("GET", "/api/categories"),
      api("GET", "/api/tags"),
      api("GET", "/api/transactions?limit=10"),
      api("GET", "/api/summary"),
    ]);
    state.wallets = wallets;
    state.categories = categories;
    state.tags = tags;
    state.recent = transactions;
    state.summary = summary;
    $("#status-line").textContent = `${summary.tx_count} tx · ${wallets.length} wallets · ${categories.length} categories · ${tags.length} tags`;
  } catch (e) {
    toast("Failed to load: " + e.message, "error");
  } finally {
    state.loading = false;
  }
}

async function reloadCollection(name) {
  const path = {
    wallets: "/api/wallets?include_archived=true",
    categories: "/api/categories",
    tags: "/api/tags",
  }[name];
  if (!path) return;
  state[name] = await api("GET", path);
}

/* ── navigation ─────────────────────────────────────────────────── */

$$("#nav button").forEach((btn) => {
  btn.addEventListener("click", () => {
    $$("#nav button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    state.view = btn.dataset.view;
    render();
  });
});

/* ── dashboard ───────────────────────────────────────────────────── */

function renderDashboard() {
  const s = state.summary || { total_income_minor:0, total_expense_minor:0, net_minor:0, tx_count:0, by_wallet:[], by_category:[] };
  const recent = state.recent || [];
  return `
    <h1>Dashboard</h1>
    <p class="subtitle">Overview of your finances.</p>
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="card stat">
        <div class="label">Income</div>
        <div class="value income">+${fmt(s.total_income_minor, primaryCurrency())}</div>
        <div class="sub">${s.tx_count} transactions total</div>
      </div>
      <div class="card stat">
        <div class="label">Expense</div>
        <div class="value expense">−${fmt(s.total_expense_minor, primaryCurrency())}</div>
        <div class="sub">Across ${s.by_wallet.length} wallet(s)</div>
      </div>
      <div class="card stat">
        <div class="label">Net</div>
        <div class="value net">${s.net_minor < 0 ? "−" : "+"}${fmt(Math.abs(s.net_minor), primaryCurrency())}</div>
        <div class="sub">Income − expense</div>
      </div>
      <div class="card stat">
        <div class="label">Wallets</div>
        <div class="value">${state.wallets.length}</div>
        <div class="sub">${state.tags.length} tag(s) · ${state.categories.length} category(s)</div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h2>Wallets</h2>
        ${s.by_wallet.length === 0
          ? `<div class="empty"><div class="emoji">▣</div>No wallets yet.</div>`
          : `<table class="data"><thead><tr><th>Name</th><th>Currency</th><th style="text-align:right">Balance</th></tr></thead><tbody>
              ${s.by_wallet.map((w) => `<tr>
                <td>${escapeHtml(w.wallet_name)}</td>
                <td>${escapeHtml(w.currency)}</td>
                <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(w.balance_minor, w.currency)}</td>
              </tr>`).join("")}
            </tbody></table>`}
      </div>
      <div class="card">
        <h2>Top categories</h2>
        ${s.by_category.filter((c) => c.total_minor > 0).length === 0
          ? `<div class="empty"><div class="emoji">⌘</div>No category activity yet.</div>`
          : `<table class="data"><thead><tr><th>Category</th><th>Kind</th><th style="text-align:right">Total</th></tr></thead><tbody>
              ${s.by_category.filter((c) => c.total_minor > 0).slice(0, 8).map((c) => `<tr>
                <td>${escapeHtml(c.category_name)}</td>
                <td><span class="badge ${c.kind}">${c.kind}</span></td>
                <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(c.total_minor, primaryCurrency())}</td>
              </tr>`).join("")}
            </tbody></table>`}
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>Recent transactions</h2>
      ${recent.length === 0
        ? `<div class="empty"><div class="emoji">⇄</div>No transactions yet.</div>`
        : `<div class="table-wrap"><table class="data">
            <thead><tr><th>When</th><th>Type</th><th>Wallet</th><th>Category</th><th>Tags</th><th>Note</th><th style="text-align:right">Amount</th></tr></thead>
            <tbody>${recent.map(txRowHtml).join("")}</tbody>
          </table></div>`}
    </div>
  `;
}

function primaryCurrency() {
  // Use the first wallet's currency as the display currency for the dashboard.
  return (state.wallets[0] && state.wallets[0].currency) || "USD";
}

function walletName(id) { return (state.wallets.find((w) => w.id === id) || {}).name || "—"; }
function categoryName(id) { return (state.categories.find((c) => c.id === id) || {}).name || "—"; }

function txRowHtml(tx) {
  return `<tr>
    <td>${escapeHtml(tx.occurred_at)}</td>
    <td><span class="badge ${tx.type}">${tx.type}</span></td>
    <td>${escapeHtml(walletName(tx.wallet_id))}</td>
    <td>${tx.category_id ? escapeHtml(categoryName(tx.category_id)) : "—"}</td>
    <td>${(tx.tag_names || []).map((n) => `<span class="tag-chip">#${escapeHtml(n)}</span>`).join("")}</td>
    <td>${escapeHtml(tx.note || "")}</td>
    <td style="text-align:right;font-variant-numeric:tabular-nums;color:${tx.type === "expense" ? "var(--expense)" : tx.type === "income" ? "var(--income)" : "var(--transfer)"}">${signFmt(tx.amount_minor, tx.currency, tx.type)}</td>
  </tr>`;
}

/* ── wallets view ────────────────────────────────────────────────── */

function renderWallets() {
  return `
    <h1>Wallets</h1>
    <p class="subtitle">Cash, bank accounts, e-wallets, credit cards — anything that holds money.</p>
    <div class="toolbar">
      <button class="btn primary" id="add-wallet">+ New wallet</button>
      <div class="spacer"></div>
      <span style="color:var(--text-dim);font-size:13px">${state.wallets.length} total</span>
    </div>
    <div class="card" style="padding:0">
      ${state.wallets.length === 0
        ? `<div class="empty"><div class="emoji">▣</div>No wallets yet. Click <b>+ New wallet</b> to start.</div>`
        : `<div class="table-wrap"><table class="data">
            <thead><tr><th>Name</th><th>Currency</th><th style="text-align:right">Opening</th><th style="text-align:right">Current balance</th><th>Status</th><th></th></tr></thead>
            <tbody>${state.wallets.map((w) => `<tr>
              <td><span class="swatch" style="background:${escapeHtml(w.color)}"></span>${escapeHtml(w.name)}</td>

async function loadTransactionsView() {
  const f = state.txFilter;
  const qs = new URLSearchParams();
  if (f.wallet_id) qs.set("wallet_id", f.wallet_id);
  if (f.category_id) qs.set("category_id", f.category_id);
  if (f.tag_id) qs.set("tag_id", f.tag_id);
  if (f.type) qs.set("type", f.type);
  if (f.from) qs.set("from", f.from);
  if (f.to) qs.set("to", f.to);
  qs.set("limit", "500");
  try {
    const rows = await api("GET", "/api/transactions?" + qs.toString());
    state.txView = rows;
    renderTxTable();
  } catch (e) {
    $("#tx-table").innerHTML = `<div class="empty">Failed to load transactions: ${escapeHtml(e.message)}</div>`;
  }
}

function renderTxTable() {
  const q = (state.txFilter.q || "").toLowerCase();
  const rows = (state.txView || []).filter((tx) => {
    if (!q) return true;
    return (tx.note || "").toLowerCase().includes(q) ||
      (tx.tag_names || []).some((n) => n.toLowerCase().includes(q));
  });
  const root = $("#tx-table");
  if (rows.length === 0) {
    root.innerHTML = `<div class="empty"><div class="emoji">⇄</div>No transactions match the current filters.</div>`;
    return;
  }
  root.innerHTML = `<div class="table-wrap"><table class="data">
    <thead><tr><th>When</th><th>Type</th><th>Wallet</th><th>Category</th><th>Tags</th><th>Note</th><th style="text-align:right">Amount</th><th></th></tr></thead>
    <tbody>${rows.map((tx) => `<tr>
      <td>${escapeHtml(tx.occurred_at)}</td>
      <td><span class="badge ${tx.type}">${tx.type}</span></td>
      <td>${escapeHtml(walletName(tx.wallet_id))}</td>
      <td>${tx.category_id ? escapeHtml(categoryName(tx.category_id)) : "—"}</td>
      <td>${(tx.tag_names || []).map((n) => `<span class="tag-chip">#${escapeHtml(n)}</span>`).join("")}</td>
      <td>${escapeHtml(tx.note || "")}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;color:${tx.type === "expense" ? "var(--expense)" : tx.type === "income" ? "var(--income)" : "var(--transfer)"}">${signFmt(tx.amount_minor, tx.currency, tx.type)}</td>
      <td class="actions">
        <button class="icon-btn" data-edit-tx="${tx.id}">Edit</button>
        <button class="icon-btn danger" data-del-tx="${tx.id}">Delete</button>
      </td>
    </tr>`).join("")}

}

/* ── modal helpers ───────────────────────────────────────────────── */

function openModal(html) {
  const root = $("#modal-root");
  root.innerHTML = `<div class="modal-backdrop" id="backdrop">
    <div class="modal" role="dialog">${html}</div>
  </div>`;
  $("#backdrop").addEventListener("click", (e) => {
    if (e.target.id === "backdrop") closeModal();
  });
  document.addEventListener("keydown", escClose);
}
function escClose(e) { if (e.key === "Escape") closeModal(); }
function closeModal() {
  $("#modal-root").innerHTML = "";
  document.removeEventListener("keydown", escClose);
}

        toast("Transaction updated", "success");
      } else {
        await api("POST", "/api/transactions", data);
        toast("Transaction created", "success");
      }
      await loadAll();
      closeModal();
      render();
    } catch (e) { $("#tx-err").textContent = e.message; }
  });
}

/* ── render & wire up ────────────────────────────────────────────── */

function render() {
  const root = $("#view");
  if (state.view === "dashboard") root.innerHTML = renderDashboard();
  else if (state.view === "wallets") root.innerHTML = renderWallets();
  else if (state.view === "categories") root.innerHTML = renderCategories();
  else if (state.view === "tags") root.innerHTML = renderTags();
  else if (state.view === "transactions") { root.innerHTML = renderTransactions(); wireTxView(); loadTransactionsView(); return; }
  else if (state.view === "capture") { root.innerHTML = renderCapture(); wireCapture(); return; }
  wireGlobal();
}

function wireGlobal() {
  // View-specific buttons
  const addWallet = $("#add-wallet");
  if (addWallet) addWallet.addEventListener("click", () => walletModal(null));
  const addCategory = $("#add-category");
  if (addCategory) addCategory.addEventListener("click", () => categoryModal(null));
  const addTag = $("#add-tag");
  if (addTag) addTag.addEventListener("click", () => tagModal(null));

  $$("[data-kind]").forEach((b) => {
    b.addEventListener("click", () => { state.categoryKind = b.dataset.kind; render(); });
  });
  $$("[data-edit-wallet]").forEach((b) => b.addEventListener("click", () => {
    const w = state.wallets.find((x) => x.id === Number(b.dataset.editWallet));
    if (w) walletModal(w);
  }));
  $$("[data-del-wallet]").forEach((b) => b.addEventListener("click", async () => {
    const id = Number(b.dataset.delWallet);
    const w = state.wallets.find((x) => x.id === id);
    if (!confirm(`Delete wallet "${w.name}"? This fails if the wallet has transactions.`)) return;
    try { await api("DELETE", "/api/wallets/" + id); toast("Wallet deleted", "success"); await loadAll(); render(); }
    catch (e) { toast(e.message, "error"); }
  }));
  $$("[data-edit-cat]").forEach((b) => b.addEventListener("click", () => {
    const c = state.categories.find((x) => x.id === Number(b.dataset.editCat));
    if (c) categoryModal(c);
  }));
  $$("[data-del-cat]").forEach((b) => b.addEventListener("click", async () => {
    const id = Number(b.dataset.delCat);
    const c = state.categories.find((x) => x.id === id);
    if (!confirm(`Delete category "${c.name}"? Transactions will lose their category.`)) return;
    try { await api("DELETE", "/api/categories/" + id); toast("Category deleted", "success"); await loadAll(); render(); }
    catch (e) { toast(e.message, "error"); }
  }));
  $$("[data-edit-tag]").forEach((b) => b.addEventListener("click", () => {
    const t = state.tags.find((x) => x.id === Number(b.dataset.editTag));
    if (t) tagModal(t);
  }));
  $$("[data-del-tag]").forEach((b) => b.addEventListener("click", async () => {
    const id = Number(b.dataset.delTag);
    const t = state.tags.find((x) => x.id === id);
    if (!confirm(`Delete tag "${t.name}"? It will be removed from all transactions.`)) return;
    try { await api("DELETE", "/api/tags/" + id); toast("Tag deleted", "success"); await loadAll(); render(); }
    catch (e) { toast(e.message, "error"); }
  }));
}

function wireTxView() {
  const bind = (id, key, transform = (v) => v) => {
    const el = $("#" + id);
    if (!el) return;
    el.addEventListener("input", () => { state.txFilter[key] = transform(el.value); loadTransactionsView(); });
  };
  bind("tx-q", "q");
  bind("tx-wallet", "wallet_id");
  bind("tx-category", "category_id");
  bind("tx-tag", "tag_id");
  bind("tx-type", "type");
  bind("tx-from", "from");
  bind("tx-to", "to");

  const clearBtn = $("#clear-filters");
  if (clearBtn) clearBtn.addEventListener("click", () => {
    state.txFilter = { wallet_id: "", category_id: "", tag_id: "", type: "", from: "", to: "", q: "" };
    render();
  });

  const addTx = $("#add-tx");
  if (addTx) addTx.addEventListener("click", () => txModal(null));

  // Re-render table on edit/delete (delegate after data arrives)
  const root = $("#view");
  root.addEventListener("click", (e) => {
    const editId = e.target.dataset && e.target.dataset.editTx;
    const delId = e.target.dataset && e.target.dataset.delTx;
    if (editId) {
      const tx = (state.txView || []).find((x) => x.id === Number(editId));
      if (tx) txModal(tx);
    } else if (delId) {
      const id = Number(delId);
      if (!confirm("Delete this transaction?")) return;
      api("DELETE", "/api/transactions/" + id).then(async () => {
        toast("Transaction deleted", "success");
        await loadAll();
        render();
      }).catch((err) => toast(err.message, "error"));
    }
  }, { once: false });
}

/* ── capture view ──────────────────────────────────────────────── */

const CAPTURE_MIME = {
  audio: ["audio/mpeg","audio/wav","audio/ogg","audio/flac","audio/mp4","audio/webm"],
  image: ["image/jpeg","image/png","image/webp","image/heic"],
  pdf: ["application/pdf"],
};
const CAPTURE_FORMATS = {
  audio: "(mp3, wav, m4a, ogg, flac, webm)",
  image: "(jpg, png, webp, heic)",
  pdf: "(PDF)",
};
const CAPTURE_ACCEPT = "audio/mpeg,audio/wav,audio/ogg,audio/flac,audio/mp4,audio/webm,image/jpeg,image/png,image/webp,image/heic,application/pdf";

function renderCapture() {
  return `
    <h1>Capture</h1>
    <p class="subtitle">Upload a file to create a transaction from its content.</p>
    <div class="toolbar">
      <div class="segmented" id="capture-tabs">
        <button data-tab="audio" class="${state.captureTab === "audio" ? "active" : ""}">Audio</button>
        <button data-tab="image" class="${state.captureTab === "image" ? "active" : ""}">Image</button>
        <button data-tab="pdf" class="${state.captureTab === "pdf" ? "active" : ""}">PDF</button>
      </div>
    </div>

    <div class="dropzone" id="capture-dropzone">
      <div class="dropzone-icon">📂</div>
      <div class="dropzone-title">Drop a file here / Letakkan berkas di sini</div>
      <div class="dropzone-hint">or click to choose</div>
      <div class="dropzone-formats" id="capture-formats">${CAPTURE_FORMATS[state.captureTab]}</div>
      <input type="file" id="capture-file-input" accept="${CAPTURE_ACCEPT}" style="display:none" />
    </div>

    <div id="capture-progress" style="display:none;margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:4px">
        <span id="capture-progress-label">Uploading…</span>
        <span id="capture-progress-pct">0%</span>
      </div>
      <div style="background:var(--bg-elev-2);border-radius:99px;height:6px;overflow:hidden">
        <div id="capture-progress-bar" style="background:var(--accent);height:100%;width:0%;transition:width .2s"></div>
      </div>
    </div>

    <div id="capture-preview" style="display:none" class="capture-preview"></div>

    <div class="capture-privacy">
      ⚠️ Files are sent to Groq for processing. / File dikirim ke Groq untuk diproses.
      Set <code>PI_FINANCE_MEDIA_ENABLED=0</code> to disable.
    </div>
  `;
}

function wireCapture() {
  // Tabs
  $$("#capture-tabs button").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.captureTab = btn.dataset.tab;
      state.captureData = null;
      render();
    });
  });

  // Drop zone: drag events
  const dz = $("#capture-dropzone");
  dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag-over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
  dz.addEventListener("drop", (e) => {
    e.preventDefault();
    dz.classList.remove("drag-over");
    const files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length > 0) captureUpload(files[0]);
  });

  // Click to pick
  dz.addEventListener("click", () => $("#capture-file-input").click());
  $("#capture-file-input").addEventListener("change", (e) => {
    if (e.target.files && e.target.files.length > 0) {
      captureUpload(e.target.files[0]);
    }
  });
}

async function captureUpload(file) {
  const tab = state.captureTab;
  const acceptMime = CAPTURE_MIME[tab];

  // Client-side MIME prefix validation
  const fileMime = file.type || "";
  const prefixOk = acceptMime.some((m) => fileMime.startsWith(m.split("/")[0]));
  if (!prefixOk && fileMime) {
    toast("File type " + fileMime + " is not supported for " + tab + " mode. / Tipe file tidak didukung.", "error");
    return;
  }

  // Show progress
  const prog = $("#capture-progress");
  const bar = $("#capture-progress-bar");
  const pct = $("#capture-progress-pct");
  const lbl = $("#capture-progress-label");
  prog.style.display = "";
  bar.style.width = "0%";
  pct.textContent = "0%";
  lbl.textContent = "Uploading… / Mengunggah…";

  state.captureData = null;
  $("#capture-preview").style.display = "none";

  try {
    // Upload via XHR for progress
    const { mediaId, kind } = await uploadFileXhr(file, prog, bar, pct, lbl);

    lbl.textContent = "Processing… / Memproses…";
    bar.style.width = "90%";
    pct.textContent = "90%";

    // Call extract endpoint
    let extractData;
    if (kind === "audio") {
      const r = await api("POST", "/api/media/transcribe", { media_id: mediaId });
      extractData = r.data;
    } else if (kind === "image") {
      const r = await api("POST", "/api/media/extract-image", { media_id: mediaId });
      extractData = r.data;
    } else if (kind === "pdf") {
      const r = await api("POST", "/api/media/extract-pdf", { media_id: mediaId, parse_as: "transactions" });
      extractData = r.data;
    }

    bar.style.width = "100%";
    pct.textContent = "100%";

    state.captureData = { mediaId, kind, result: extractData, sourceName: file.name, file };
    showPreview(extractData, kind, file.name, file);

    setTimeout(() => { prog.style.display = "none"; bar.style.width = "0%"; }, 800);
  } catch (e) {
    prog.style.display = "none";
    toast("Upload failed: " + e.message + " / Gagal mengunggah", "error");
  }
}

function uploadFileXhr(file, progEl, barEl, pctEl, lblEl) {
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append("file", file);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/media/ingest");

    xhr.upload.addEventListener("progress", (e) => {
      if (e.lengthComputable) {
        const p = Math.round((e.loaded / e.total) * 100);
        barEl.style.width = p + "%";
        pctEl.textContent = p + "%";
      }
    });

    xhr.addEventListener("load", () => {
      let data;
      try { data = JSON.parse(xhr.responseText); } catch { data = null; }
      if (xhr.status >= 200 && xhr.status < 300 && data && data.ok) {
        resolve(data.data);
      } else {
        const msg = (data && (data.error || (data.error && data.error.message))) || "Upload returned " + xhr.status;
        reject(new Error(msg));
      }
    });

    xhr.addEventListener("error", () => reject(new Error("Network error / Gagal jaringan")));
    xhr.addEventListener("abort", () => reject(new Error("Upload cancelled / Batal")));

    xhr.send(fd);
  });
}

function showPreview(data, kind, sourceName, sourceFile) {
  const preview = $("#capture-preview");
  preview.style.display = "";

  if (kind === "pdf" && data.transactions && data.transactions.length > 0) {
    // Bank-statement checklist
    renderChecklist(data, sourceName, sourceFile);
  } else if (kind === "pdf" && (!data.transactions || data.transactions.length === 0)) {
    // No transactions found
    preview.innerHTML = `
      <div class="card" style="margin:0">
        <div class="preview-meta">📄 PDF — ${escapeHtml(sourceName)}</div>
        <div class="preview-text">${escapeHtml(data.text || "(No text extracted / Tidak ada teks)")}</div>
        <div style="margin-top:12px">
          <span class="badge" style="background:rgba(245,158,11,.15);color:#f59e0b">No transactions found</span>
        </div>
      </div>`;
  } else {
    // Audio / image single-result preview
    const text = data.text || "";
    const structured = data.structured;
    const metaParts = [kind === "audio" ? "🎤" : "🖼️", escapeHtml(sourceName)];
    if (data.language) metaParts.push("— " + data.language);
    if (data.duration_sec) metaParts.push("(" + Math.round(data.duration_sec) + "s)");

    let structuredHtml = "";
    if (structured && typeof structured === "object") {
      structuredHtml = `<div style="margin-top:10px;background:var(--bg-elev-2);padding:10px;border-radius:8px;font-size:12px">
        ${Object.entries(structured).filter(([k]) => k !== "text").map(([k, v]) =>
          `<div><span style="color:var(--text-dim)">${escapeHtml(k)}:</span> ${escapeHtml(String(v))}</div>`
        ).join("")}
      </div>`;
    }

    preview.innerHTML = `
      <div class="card" style="margin:0">
        <div class="preview-meta">${metaParts.join(" ")}</div>
        <div class="preview-text">${escapeHtml(text)}</div>
        ${structuredHtml}
        <div class="preview-actions">
          <button class="btn primary" id="capture-accept">Accept &amp; create transaction / Terima &amp; buat transaksi</button>
          <button class="btn ghost" id="capture-reject">Reject / Tolak</button>
        </div>
      </div>`;

    $("#capture-accept").addEventListener("click", async () => {
      // Open the transaction modal pre-filled with extracted data
      await loadAll(); // ensure wallets/categories are fresh
      const prefillTx = buildPrefillTx(text, structured, kind);
      txModal(prefillTx);
      $("#capture-reject").click(); // hide preview (modal is open now)
    });
    $("#capture-reject").addEventListener("click", () => {
      preview.style.display = "none";
      state.captureData = null;
    });
  }
}

function buildPrefillTx(text, structured, kind) {
  const defaultWallet = state.wallets[0];
  const tx = {
    type: "expense",
    wallet_id: defaultWallet ? defaultWallet.id : null,
    category_id: null,
    amount_minor: 0,
    currency: defaultWallet ? defaultWallet.currency : "USD",
    note: text || "",
    occurred_at: new Date().toISOString().slice(0, 10),
    tag_ids: [],
  };

  if (structured) {
    if (structured.amount && typeof structured.amount === "number") {
      tx.amount_minor = structured.amount;
    }
    if (structured.date) {
      tx.occurred_at = String(structured.date).slice(0, 10);
    }
    if (structured.merchant && !tx.note) {
      tx.note = String(structured.merchant);
    }
  }

  // Try to guess a category that matches
  if (kind === "image" && state.categories.length > 0) {
    const expenseCats = state.categories.filter((c) => c.kind === "expense");
    if (expenseCats.length > 0) tx.category_id = expenseCats[0].id;
  }

  return tx;
}

function renderChecklist(data, sourceName, sourceFile) {
  const preview = $("#capture-preview");
  const candidates = data.transactions || [];

  // Compute SHA-256 hex from the ORIGINAL FILE BYTES (not the JSON of the extraction result).
  // The provenance marker must identify the source PDF, not the model's structured output.
  // Without the original file, we leave sha256Hex empty (the user can still bulk-create
  // without provenance, but the UI surfaces a small warning).
  let sha256Hex = "";
  if (sourceFile && sourceFile.arrayBuffer) {
    (async () => {
      try {
        const ab = await sourceFile.arrayBuffer();
        const digest = await crypto.subtle.digest("SHA-256", ab);
        sha256Hex = Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
      } catch { /* ignore */ }
    })();
  }

  const rows = candidates.map((c, i) => `
    <div class="check-row" data-idx="${i}">
      <input type="checkbox" checked data-idx="${i}" />
      <span style="flex:1">
        <strong>${escapeHtml(c.description || "—")}</strong>
        <span style="color:var(--text-dim);font-size:12px;margin-left:8px">
          ${c.occurred_at ? escapeHtml(String(c.occurred_at).slice(0, 10)) : "—"}
          · ${fmt(c.amount_minor, c.currency || "IDR")}
        </span>
        ${c.confidence != null && c.confidence < 0.6
          ? `<span class="badge" style="background:rgba(239,68,68,.15);color:var(--expense);margin-left:4px">low conf</span>`
          : ""}
      </span>
      <button class="icon-btn" data-edit-candidate="${i}">Edit</button>
    </div>
  `).join("");

  preview.innerHTML = `
    <div class="card" style="margin:0">
      <div class="preview-meta">📄 PDF — ${escapeHtml(sourceName)} — ${candidates.length} candidate(s)</div>
      <div class="capture-checklist">
        <div class="toolbar" style="margin-bottom:8px">
          <button class="btn small" id="check-select-all">Select all / Pilih semua</button>
          <button class="btn small" id="check-deselect-all">Deselect all</button>
          <div class="spacer"></div>
          <span style="font-size:12px;color:var(--text-dim)" id="check-count">${candidates.length} selected</span>
        </div>
        ${rows}
      </div>
      <div class="preview-actions">
        <button class="btn primary" id="capture-bulk-create" disabled>Create all accepted / Buat semua</button>
        <button class="btn ghost" id="capture-reject">Cancel</button>
      </div>
    </div>`;

  // Wire checklist
  let selected = new Set(candidates.map((_, i) => i));
  const updateCount = () => {
    const btn = $("#capture-bulk-create");
    btn.disabled = selected.size === 0;
    $("#check-count").textContent = selected.size + " selected";
  };

  $$(".check-row input[type='checkbox']").forEach((cb) => {
    cb.addEventListener("change", () => {
      const idx = Number(cb.dataset.idx);
      if (cb.checked) selected.add(idx); else selected.delete(idx);
      updateCount();
    });
  });

  $("#check-select-all").addEventListener("click", () => {
    $$(".check-row input[type='checkbox']").forEach((cb) => { cb.checked = true; selected.add(Number(cb.dataset.idx)); });
    updateCount();
  });
  $("#check-deselect-all").addEventListener("click", () => {
    $$(".check-row input[type='checkbox']").forEach((cb) => { cb.checked = false; selected.delete(Number(cb.dataset.idx)); });
    updateCount();
  });

  // Per-row Edit
  $$("[data-edit-candidate]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const idx = Number(btn.dataset.editCandidate);
      const cand = candidates[idx];
      if (!cand) return;
      const defaultWallet = state.wallets[0];
      txModal({
        type: cand.type || "expense",
        wallet_id: cand.suggested_wallet_id || (defaultWallet ? defaultWallet.id : null),
        category_id: cand.suggested_category_id || null,
        amount_minor: cand.amount_minor || 0,
        currency: cand.currency || "IDR",
        note: cand.description || "",
        occurred_at: cand.occurred_at ? String(cand.occurred_at).slice(0, 10) : new Date().toISOString().slice(0, 10),
        tag_ids: [],
      });
    });
  });

  // Bulk create
  $("#capture-bulk-create").addEventListener("click", async () => {
    const selectedCands = Array.from(selected).sort((a, b) => a - b).map((i) => candidates[i]);
    const defaultWallet = state.wallets[0];
    if (!defaultWallet) { toast("No wallet available / Tidak ada dompet", "error"); return; }

    const btn = $("#capture-bulk-create");
    btn.disabled = true;
    btn.textContent = "Creating… / Membuat…";

    try {
      const r = await api("POST", "/api/transactions/bulk", {
        wallet_id: defaultWallet.id,
        default_currency: defaultWallet.currency,
        source_filename: sourceName || undefined,
        source_sha256_hex: sha256Hex || undefined,
        transactions: selectedCands,
      });

      const created = (r.created || []).length;
      const skipped = (r.skipped || []).length;
      toast(`Created ${created} transaction(s), skipped ${skipped}. / ${created} transaksi dibuat, ${skipped} dilewati.`, "success");

      await loadAll();
      state.captureData = null;
      // Navigate to transactions view
      const navBtn = $$("#nav button").find((b) => b.dataset.view === "transactions");
      if (navBtn) navBtn.click();
    } catch (e) {
      toast("Bulk create failed: " + e.message + " / Gagal", "error");
      btn.disabled = false;
      btn.textContent = "Create all accepted / Buat semua";
    }
  });

  $("#capture-reject").addEventListener("click", () => {
    preview.style.display = "none";
    state.captureData = null;
  });

  updateCount();
}

/* ── boot ────────────────────────────────────────────────────────── */

(async function init() {
  await loadAll();
  render();
  setInterval(loadAll, 30_000); // light polling so dashboard stays current
})();
</script>
